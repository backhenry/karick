# Infra de apoio para evolução do projeto (ainda não usada pelo PoC in-memory).
# `npm run infra:up` sobe Postgres (persistência) e Redis (estado vivo + adapter).
services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: karick
      POSTGRES_PASSWORD: karick
      POSTGRES_DB: karick
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - '6379:6379'

volumes:
  pgdata:
