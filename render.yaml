# Render Blueprint — o Render lê este arquivo e cria o serviço já configurado.
# https://render.com/docs/blueprint-spec
services:
  - type: web
    name: karick
    runtime: node
    plan: free
    region: oregon
    # --include=dev garante o vite/typescript (devDeps) mesmo com NODE_ENV=production
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      # Connection string do Postgres (Supabase). Marcada como secret:
      # o Render pede o valor no painel ao aplicar o Blueprint. Sem ela,
      # o app roda em memória (quizzes/histórico não persistem).
      - key: DATABASE_URL
        sync: false
      # Segredo para assinar os cookies de sessão — o Render gera um valor forte.
      - key: SESSION_SECRET
        generateValue: true
